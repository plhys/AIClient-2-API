<div class="clash-config-container">
    <h2 data-i18n="clash.title">Clash Guardian 配置</h2>
    
    <div class="clash-status">
        <div class="status-dot" id="clashStatusDot"></div>
        <span id="clashStatusText">正在获取状态...</span>
    </div>

    <div class="config-group">
        <label for="clashSubUrl">订阅地址 (Subscription URL)</label>
        <input type="text" id="clashSubUrl" placeholder="https://example.com/sub?token=...">
    </div>

    <div class="config-group">
        <label for="clashProxyPort">本地代理端口 (Default: 7890)</label>
        <input type="text" id="clashProxyPort" placeholder="7890">
    </div>

    <div class="highlight-note" style="margin-bottom: 20px;">
        <i class="fas fa-shield-alt"></i>
        <span><b>极客安全策略：</b> 开启后，仅显式在提供商配置中启用“系统代理”或指定代理地址的请求才会经过 Clash。系统环境流量默认保持直连。</span>
    </div>

    <div class="plugins-controls">
        <button class="btn btn-primary" onclick="saveClashConfig()">
            <i class="fas fa-save"></i> <span>保存并同步订阅</span>
        </button>
    </div>
</div>

<script>
    async function loadClashConfig() {
        try {
            const res = await fetch('/api/plugins/clash/config');
            const config = await res.json();
            document.getElementById('clashSubUrl').value = config.subUrl || '';
            document.getElementById('clashProxyPort').value = config.port || '7890';
            
            const statusDot = document.getElementById('clashStatusDot');
            const statusText = document.getElementById('clashStatusText');
            if (config.running) {
                statusDot.classList.add('active');
                statusText.textContent = 'Clash 核心正在运行 (PID: ' + config.pid + ')';
            } else {
                statusDot.classList.remove('active');
                statusText.textContent = 'Clash 核心未启动';
            }
        } catch (e) {
            console.error('Failed to load Clash config', e);
        }
    }

    async function saveClashConfig() {
        const subUrl = document.getElementById('clashSubUrl').value;
        const port = document.getElementById('clashProxyPort').value;
        
        try {
            const res = await fetch('/api/plugins/clash/config', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ subUrl, port })
            });
            const result = await res.json();
            if (result.success) {
                alert('配置已保存！Clash 正在后台同步订阅并重启...');
                loadClashConfig();
            }
        } catch (e) {
            alert('保存失败: ' + e.message);
        }
    }

    loadClashConfig();
</script>

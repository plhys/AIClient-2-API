<section id="network" class="section">
  <div class="section-header">
    <h2>🌐 虚拟网络 (EasyTier)</h2>
    <p class="section-desc">P2P虚拟网络配置与管理</p>
  </div>

  <div style="padding: 20px; max-width: 600px; margin: 0 auto;">
    <!-- 配置面板 -->
    <div style="background: var(--bg-card, #1a1a1a); border-radius: 12px; padding: 24px; border: 1px solid var(--border-color, #333);">
      <h3 style="margin: 0 0 20px 0; font-size: 16px; color: #e6edf3;">网络配置</h3>
      
      <!-- 运行状态 -->
      <div id="et-run-status" style="margin-bottom: 20px; padding: 12px 16px; background: #0d1117; border-radius: 8px; border-left: 3px solid #6e7681;">
        <div style="display: flex; align-items: center; justify-content: space-between;">
          <span style="font-size: 13px; color: #8b949e;">运行状态</span>
          <span id="et-status-text" style="font-size: 13px; color: #6e7681;">● 未启动</span>
        </div>
        <div id="et-pid-info" style="margin-top: 6px; font-size: 12px; color: #6e7681; display: none;"></div>
      </div>
      
      <!-- 虚拟IP -->
      <div style="margin-bottom: 16px;">
        <label style="display: block; font-size: 13px; color: #8b949e; margin-bottom: 6px;">虚拟IP (留空则自动分配)</label>
        <input type="text" id="et-vip" placeholder="例如: 10.144.144.1 (可选)" 
          style="width: 100%; padding: 10px 12px; background: #0d1117; border: 1px solid #30363d; border-radius: 6px; color: #c9d1d9; font-size: 14px; box-sizing: border-box;">
      </div>

      <!-- 网络名称 -->
      <div style="margin-bottom: 16px;">
        <label style="display: block; font-size: 13px; color: #8b949e; margin-bottom: 6px;">网络名称 <span style="color: #f0883e;">*</span></label>
        <input type="text" id="et-network" placeholder="例如: my-vpn" 
          style="width: 100%; padding: 10px 12px; background: #0d1117; border: 1px solid #30363d; border-radius: 6px; color: #c9d1d9; font-size: 14px; box-sizing: border-box;">
      </div>

      <!-- 密码 -->
      <div style="margin-bottom: 16px;">
        <label style="display: block; font-size: 13px; color: #8b949e; margin-bottom: 6px;">网络密码 <span style="color: #f0883e;">*</span></label>
        <input type="password" id="et-token" placeholder="设置共享密钥" 
          style="width: 100%; padding: 10px 12px; background: #0d1117; border: 1px solid #30363d; border-radius: 6px; color: #c9d1d9; font-size: 14px; box-sizing: border-box;">
      </div>

      <!-- 公共服务器 -->
      <div style="margin-bottom: 20px;">
        <label style="display: block; font-size: 13px; color: #8b949e; margin-bottom: 6px;">公共服务器 (可选)</label>
        <input type="text" id="et-relay" placeholder="例如: tcp://example.com:11010 (可选)" 
          style="width: 100%; padding: 10px 12px; background: #0d1117; border: 1px solid #30363d; border-radius: 6px; color: #c9d1d9; font-size: 14px; box-sizing: border-box;">
      </div>

      <!-- 模式切换 -->
      <div style="margin-bottom: 20px; padding: 14px; background: #161b22; border-radius: 8px;">
        <div style="display: flex; align-items: center; justify-content: space-between; margin-bottom: 10px;">
          <span style="font-size: 13px; color: #8b949e;">网络模式</span>
          <span id="et-mode-text" style="font-size: 13px; color: #3fb950;">TUN模式</span>
        </div>
        <div style="display: flex; align-items: center; gap: 12px;">
          <span style="font-size: 14px; color: #e6edf3;">TUN</span>
          <div onclick="toggleMode()" style="cursor: pointer; width: 48px; height: 26px; background: #238636; border-radius: 13px; position: relative;" id="et-mode-switch">
            <div style="position: absolute; top: 3px; left: 3px; width: 20px; height: 20px; background: white; border-radius: 50%; transition: 0.3s;" id="et-mode-knob"></div>
          </div>
          <span style="font-size: 14px; color: #8b949e;">SOCKS5</span>
        </div>
      </div>

      <!-- 高级选项 -->
      <div style="margin-bottom: 20px;">
        <label style="display: flex; align-items: center; gap: 10px; cursor: pointer; margin-bottom: 10px;">
          <input type="checkbox" id="et-latency" checked style="accent-color: #238636; width: 16px; height: 16px;">
          <span style="font-size: 14px; color: #e6edf3;">延迟优先</span>
        </label>
        <label style="display: flex; align-items: center; gap: 10px; cursor: pointer; margin-bottom: 10px;">
          <input type="checkbox" id="et-multi" checked style="accent-color: #238636; width: 16px; height: 16px;">
          <span style="font-size: 14px; color: #e6edf3;">多线程</span>
        </label>
        <label style="display: flex; align-items: center; gap: 10px; cursor: pointer;">
          <input type="checkbox" id="et-autostart" checked style="accent-color: #238636; width: 16px; height: 16px;">
          <span style="font-size: 14px; color: #e6edf3;">开机自动启动</span>
        </label>
      </div>

      <!-- 控制按钮 -->
      <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 12px;">
        <button id="btn-start-et" onclick="startETService()" style="padding: 12px; background: #238636; color: white; border: none; border-radius: 6px; cursor: pointer; font-size: 14px; font-weight: 500;">▶ 启动服务</button>
        <button id="btn-stop-et" onclick="stopETService()" style="padding: 12px; background: #da3633; color: white; border: none; border-radius: 6px; cursor: pointer; font-size: 14px; font-weight: 500; opacity: 0.5;" disabled>⏹ 停止服务</button>
      </div>
      <button onclick="saveETConfigOnly()" style="width: 100%; padding: 12px; background: #1f6feb; color: white; border: none; border-radius: 6px; cursor: pointer; font-size: 14px; font-weight: 500;">💾 保存配置</button>

      <!-- 消息提示 -->
      <div id="et-message" style="margin-top: 16px; padding: 12px; background: #161b22; border-radius: 6px; font-size: 13px; color: #8b949e; display: none; text-align: center;"></div>
    </div>
  </div>

  <script>
    // API 基础路径
    const API_BASE = '/api/network';
    
    // 状态
    let currentStatus = { running: false };
    
    // 更新状态显示
    function updateStatusUI(status) {
      currentStatus = status;
      const statusText = document.getElementById('et-status-text');
      const statusBox = document.getElementById('et-run-status');
      const pidInfo = document.getElementById('et-pid-info');
      const btnStart = document.getElementById('btn-start-et');
      const btnStop = document.getElementById('btn-stop-et');
      
      if (status.running) {
        statusText.innerHTML = '<span style="color: #3fb950;">● 运行中</span>';
        statusBox.style.borderLeftColor = '#3fb950';
        pidInfo.textContent = `PID: ${status.pid || 'N/A'}${status.ttydRunning ? ' | TTYD: 运行中' : ''}`;
        pidInfo.style.display = 'block';
        btnStart.disabled = true;
        btnStart.style.opacity = '0.5';
        btnStop.disabled = false;
        btnStop.style.opacity = '1';
      } else {
        statusText.innerHTML = '<span style="color: #6e7681;">● 未启动</span>';
        statusBox.style.borderLeftColor = '#6e7681';
        pidInfo.style.display = 'none';
        btnStart.disabled = false;
        btnStart.style.opacity = '1';
        btnStop.disabled = true;
        btnStop.style.opacity = '0.5';
      }
    }
    
    // 获取状态
    async function fetchStatus() {
      try {
        const res = await fetch(`${API_BASE}/status`);
        if (res.ok) {
          const data = await res.json();
          if (data.success) {
            updateStatusUI(data);
          }
        }
      } catch (e) {
        console.error('获取状态失败:', e);
      }
    }
    
    // 显示消息
    function showMessage(text, isError = false) {
      const msg = document.getElementById('et-message');
      msg.textContent = text;
      msg.style.color = isError ? '#f0883e' : '#3fb950';
      msg.style.display = 'block';
      setTimeout(() => { msg.style.display = 'none'; }, 5000);
    }

    // 开关模式
    function toggleMode() {
      const knob = document.getElementById('et-mode-knob');
      const isTun = knob.style.left !== '22px';
      knob.style.left = isTun ? '22px' : '3px';
      document.getElementById('et-mode-switch').style.background = isTun ? '#6e7681' : '#238636';
      document.getElementById('et-mode-text').textContent = isTun ? 'SOCKS5模式' : 'TUN模式';
      document.getElementById('et-mode-text').style.color = isTun ? '#8b949e' : '#3fb950';
    }

    // 启动服务
    async function startETService() {
      const vip = document.getElementById('et-vip').value;
      const network = document.getElementById('et-network').value;
      const token = document.getElementById('et-token').value;
      const relay = document.getElementById('et-relay').value;
      const isTun = document.getElementById('et-mode-knob').style.left !== '22px';
      const latencyFirst = document.getElementById('et-latency').checked;
      const multiThread = document.getElementById('et-multi').checked;
      const autoStart = document.getElementById('et-autostart').checked;

      if (!network || !token) {
        showMessage('请填写网络名称和密码', true);
        return;
      }
      
      showMessage('正在启动 EasyTier...');

      try {
        const res = await fetch(`${API_BASE}/start`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            vip: vip,  // 留空则使用 DHCP 自动分配
            networkName: network,
            networkSecret: token,
            relay: relay,  // 留空则不指定对等节点
            noTun: !isTun,
            latencyFirst,
            multiThread,
            autoStart
          })
        });
        
        const data = await res.json();
        if (data.success) {
          showMessage('EasyTier 启动成功!');
          fetchStatus();
        } else {
          showMessage(data.error || '启动失败', true);
        }
      } catch (e) {
        showMessage('启动失败: ' + e.message, true);
      }
    }
    
    // 停止服务
    async function stopETService() {
      showMessage('正在停止 EasyTier...');
      
      try {
        const res = await fetch(`${API_BASE}/stop`, { method: 'POST' });
        const data = await res.json();
        if (data.success) {
          showMessage('EasyTier 已停止');
          fetchStatus();
        } else {
          showMessage(data.error || '停止失败', true);
        }
      } catch (e) {
        showMessage('停止失败: ' + e.message, true);
      }
    }

    // 保存配置
    async function saveETConfigOnly() {
      const config = {
        vip: document.getElementById('et-vip').value,
        networkName: document.getElementById('et-network').value,
        networkSecret: document.getElementById('et-token').value,
        relay: document.getElementById('et-relay').value,
        noTun: document.getElementById('et-mode-knob').style.left === '22px',
        latencyFirst: document.getElementById('et-latency').checked,
        multiThread: document.getElementById('et-multi').checked,
        autoStart: document.getElementById('et-autostart').checked
      };

      try {
        const res = await fetch(`${API_BASE}/config`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(config)
        });
        
        const data = await res.json();
        if (data.success) {
          showMessage('配置已保存');
        } else {
          showMessage(data.error || '保存失败', true);
        }
      } catch (e) {
        showMessage('保存失败: ' + e.message, true);
      }
    }

    // 加载配置
    async function loadETConfigFromServer() {
      try {
        const res = await fetch(`${API_BASE}/config`);
        if (res.ok) {
          const data = await res.json();
          if (data.success && data.config) {
            const cfg = data.config;
            if (cfg.vip) document.getElementById('et-vip').value = cfg.vip;
            if (cfg.networkName) document.getElementById('et-network').value = cfg.networkName;
            if (cfg.relay) document.getElementById('et-relay').value = cfg.relay;
            document.getElementById('et-latency').checked = cfg.latencyFirst;
            document.getElementById('et-multi').checked = cfg.multiThread;
            document.getElementById('et-autostart').checked = cfg.autoStart;
            if (cfg.noTun) {
              document.getElementById('et-mode-knob').style.left = '22px';
              document.getElementById('et-mode-switch').style.background = '#6e7681';
              document.getElementById('et-mode-text').textContent = 'SOCKS5模式';
              document.getElementById('et-mode-text').style.color = '#8b949e';
            }
          }
        }
      } catch (e) {
        console.error('加载配置失败:', e);
      }
    }

    // 设置默认值（方便用户看到示例配置）
    function setDefaultValues() {
      document.getElementById('et-vip').value = '10.11.11.144';
      document.getElementById('et-network').value = 'NASP2P-v3';
      document.getElementById('et-token').value = 'iflow203v3';
      document.getElementById('et-relay').value = 'tcp://132.226.16.109:11030';
      // 默认关闭 TUN（使用 SOCKS5 模式）
      document.getElementById('et-mode-knob').style.left = '22px';
      document.getElementById('et-mode-switch').style.background = '#6e7681';
      document.getElementById('et-mode-text').textContent = 'SOCKS5模式';
      document.getElementById('et-mode-text').style.color = '#8b949e';
      // 默认勾选所有高级选项
      document.getElementById('et-latency').checked = true;
      document.getElementById('et-multi').checked = true;
      document.getElementById('et-autostart').checked = true;
    }

    // 初始化
    loadETConfigFromServer();
    setDefaultValues(); // 设置默认值（会被服务器配置覆盖）
    fetchStatus();
    
    // 定时刷新
    setInterval(fetchStatus, 10000);
  </script>
</section>
